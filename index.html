<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Signatures Dinamicom</title>
<style>*{box-sizing:border-box;margin:0;padding:0}
:root{--v:#A56DFF;--n:#241F55;--b:#F7F6FB;--e:#E8E4F5;--f:'Segoe UI',Arial,sans-serif}
body{font-family:var(--f);background:var(--b);color:var(--n)}
header{background:var(--n);padding:14px 24px;display:flex;align-items:center;gap:10px}
header b{color:#fff;font-size:16px}
.logo{background:var(--v);color:#fff;width:32px;height:32px;border-radius:7px;display:grid;place-items:center;font-weight:900;font-size:16px}
.bar{background:#fff;border-bottom:1px solid var(--e);padding:7px 16px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;font-size:12px;color:#888}
.chip{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--e);background:#fff;cursor:pointer;color:var(--n)}
.chip:hover,.chip.add{color:var(--v);border-color:var(--v)}
.chip.add{border-style:dashed;background:var(--b)}
.chip.on{background:var(--n);color:#fff;border-color:var(--n)}
.chip.del{color:#FF3347;border-color:#ffc0c5;background:#fff0f1}
.wrap{display:grid;grid-template-columns:290px 1fr;min-height:calc(100vh - 88px)}
aside{background:#fff;border-right:1px solid var(--e);overflow-y:auto;padding-bottom:32px}
.sec{padding:14px 16px 2px}
.st{font-size:10.5px;font-weight:700;letter-spacing:.1em;color:var(--v);text-transform:uppercase;margin-bottom:8px}
label{font-size:12px;color:#555;display:block;margin-bottom:2px;font-weight:500}
input[type=text],input[type=email],input[type=tel],input[type=url],textarea{width:100%;padding:6px 8px;font-size:12px;border:1px solid var(--e);border-radius:6px;font-family:var(--f);color:var(--n);background:#fafafe;margin-bottom:7px}
input:focus,textarea:focus{outline:none;border-color:var(--v)}
textarea{resize:vertical;min-height:46px}
hr{border:none;border-top:1px solid var(--e);margin:4px 0 10px}
.tg{display:flex;flex-direction:column;gap:7px}
.tr{display:flex;align-items:center;justify-content:space-between}
.tr label{margin:0}
.sw{position:relative;width:36px;height:20px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0}
.sl{position:absolute;inset:0;background:#ccc;border-radius:20px;cursor:pointer;transition:.2s}
.sw input:checked+.sl{background:var(--v)}
.sl:before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.sw input:checked+.sl:before{transform:translateX(16px)}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.cf label{font-size:11px;margin-bottom:3px}
.cr{display:flex;align-items:center;gap:5px}
input[type=color]{width:28px;height:28px;border-radius:5px;border:1px solid var(--e);padding:2px;cursor:pointer}
.ch{flex:1;font-size:11px;font-family:monospace;padding:4px 6px;border:1px solid var(--e);border-radius:5px;background:#fafafe;color:var(--n);margin-bottom:0}
.ps{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.pb{padding:5px 11px;border-radius:6px;font-size:11.5px;font-weight:600;border:1px solid var(--e);background:#fff;cursor:pointer;font-family:var(--f);color:var(--n)}
.pb:hover{color:var(--v);border-color:var(--v)}
.pw{display:flex;flex-direction:column;align-items:center;gap:7px;padding:8px 0}
.pr{width:72px;height:72px;border-radius:50%;border:2px solid var(--v);overflow:hidden;background:var(--b);display:flex;align-items:center;justify-content:center;cursor:pointer}
.pr img{width:100%;height:100%;object-fit:cover;display:none}
.pu{font-size:11px;color:var(--v);background:var(--b);border:1px solid var(--e);border-radius:5px;padding:5px 12px;cursor:pointer;font-family:var(--f);font-weight:600}
main{padding:24px;overflow-y:auto}
.mt{font-size:10.5px;font-weight:700;letter-spacing:.1em;color:var(--v);text-transform:uppercase;margin-bottom:12px}
.ac{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.btn{padding:9px 18px;border-radius:7px;font-size:12.5px;font-weight:600;font-family:var(--f);cursor:pointer;border:none;transition:opacity .15s}
.btn:hover{opacity:.85}
.bp{background:var(--n);color:#fff}.bs{background:var(--v);color:#fff}
.ba{background:#C6E83C;color:var(--n)}.bg2{background:#fff;color:var(--n);border:1px solid var(--e)}
.btn.ok{background:#22c55e!important;color:#fff}
.pc{background:#fff;border-radius:12px;border:1px solid var(--e);padding:28px;margin-bottom:16px;overflow-x:auto}
.hb textarea{width:100%;height:110px;font-size:11px;font-family:'Courier New',monospace;background:#f8f7ff;border:1px solid var(--e);border-radius:7px;padding:8px;color:#333;resize:vertical}
.hint{font-size:11px;color:#999;margin-top:6px}
.toast{position:fixed;bottom:16px;right:16px;background:var(--n);color:#fff;padding:9px 16px;border-radius:7px;font-size:12.5px;font-weight:600;transform:translateY(60px);opacity:0;transition:.3s;z-index:99;pointer-events:none}
.toast.on{transform:translateY(0);opacity:1}</style>
</head>
<body>
<header><div class="logo">D</div><b>Signatures &mdash; <span style="color:var(--v)">Dinamicom</span></b></header>
<div class="bar" id="bar"><span>Profils :</span></div>
<div class="wrap">
<aside>
  <div class="sec"><div class="st">Photo</div>
    <div class="pw">
      <div class="pr" id="pr" onclick="document.getElementById('fi').click()">
        <img id="pi" src="" alt="">
        <svg id="pp" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#A56DFF" stroke-width="1.4"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </div>
      <button class="pu" onclick="document.getElementById('fi').click()">Choisir une photo</button>
      <input type="file" id="fi" accept="image/*" style="display:none">
    </div>
  </div>
  <hr>
  <div class="sec"><div class="st">Identit&#233;</div>
    <label>Pr&#233;nom</label><input type="text" id="fn" value="Chlo&#233;" oninput="R()">
    <label>Nom</label><input type="text" id="ln" value="Jacqueline" oninput="R()">
    <label>Titre</label><textarea id="ro" oninput="R()">Fondatrice de l&#39;agence Dinamicom</textarea>
  </div>
  <div class="sec"><div class="st">Contact</div>
    <label>Email</label><input type="email" id="em" value="chloe@dinamicom.fr" oninput="R()">
    <label>T&#233;l. fixe</label><input type="tel" id="ph" value="02 31 64 09 25" oninput="R()">
    <label>Mobile</label><input type="tel" id="mo" value="06 07 05 53 41" oninput="R()">
    <label>Adresse</label><input type="text" id="ad" value="13 Route de Rouen, 14130 Pont-L&#39;&#201;v&#234;que" oninput="R()">
    <label>Site web</label><input type="text" id="we" value="dinamicom.fr" oninput="R()">
  </div>
  <div class="sec"><div class="st">R&#233;seaux</div>
    <label>Facebook</label><input type="url" id="fb" value="https://facebook.com/dinamicom" oninput="R()">
    <label>LinkedIn</label><input type="url" id="li" value="https://linkedin.com/company/dinamicom" oninput="R()">
    <label>Instagram</label><input type="url" id="ig" value="https://instagram.com/dinamicom" oninput="R()">
  </div>
  <div class="sec"><div class="st">Affichage</div>
    <div class="tg">
      <div class="tr"><label>T&#233;l. fixe</label><label class="sw"><input type="checkbox" id="sp" checked oninput="R()"><span class="sl"></span></label></div>
      <div class="tr"><label>Mobile</label><label class="sw"><input type="checkbox" id="sm" checked oninput="R()"><span class="sl"></span></label></div>
      <div class="tr"><label>Adresse</label><label class="sw"><input type="checkbox" id="sa" checked oninput="R()"><span class="sl"></span></label></div>
      <div class="tr"><label>Site web</label><label class="sw"><input type="checkbox" id="sw2" checked oninput="R()"><span class="sl"></span></label></div>
      <div class="tr"><label>R&#233;seaux sociaux</label><label class="sw"><input type="checkbox" id="ss" checked oninput="R()"><span class="sl"></span></label></div>
      <div class="tr"><label>Photo portrait</label><label class="sw"><input type="checkbox" id="sph" checked oninput="R()"><span class="sl"></span></label></div>
      <div class="tr"><label>Logo Dinamicom</label><label class="sw"><input type="checkbox" id="slg" checked oninput="R()"><span class="sl"></span></label></div>
    </div>
  </div>
  <div class="sec" style="margin-top:10px"><div class="st">Couleurs</div>
    <div class="cgrid">
      <div class="cf"><label>Nom</label><div class="cr"><input type="color" id="cnm" value="#241F55" oninput="sc('cnm','hnm')"><input class="ch" id="hnm" value="#241F55" oninput="sh('hnm','cnm')" maxlength="7"></div></div>
      <div class="cf"><label>Accent</label><div class="cr"><input type="color" id="cac" value="#A56DFF" oninput="sc('cac','hac')"><input class="ch" id="hac" value="#A56DFF" oninput="sh('hac','cac')" maxlength="7"></div></div>
      <div class="cf"><label>S&#233;parateur</label><div class="cr"><input type="color" id="cdiv" value="#E0E0E0" oninput="sc('cdiv','hdiv')"><input class="ch" id="hdiv" value="#E0E0E0" oninput="sh('hdiv','cdiv')" maxlength="7"></div></div>
    </div>
    <div class="ps">
      <button class="pb" onclick="P('navy')">Navy</button>
      <button class="pb" onclick="P('violet')">Violet</button>
      <button class="pb" onclick="P('blue')">Bleu</button>
      <button class="pb" onclick="P('red')">Rouge</button>
      <button class="pb" onclick="P('lime')">Lime</button>
    </div>
  </div>
</aside>
<main>
  <div class="mt">Aper&#231;u</div>
  <div class="ac">
    <button class="btn bp" id="bc" onclick="cpH()">Copier HTML</button>
    <button class="btn bs" onclick="sP()">Enregistrer</button>
    <button class="btn ba" onclick="dlH()">T&#233;l&#233;charger</button>
    <button class="btn bg2" onclick="P('navy')">Reset</button>
  </div>
  <div class="pc" id="pv"></div>
  <div class="mt" style="margin-top:14px">HTML &#224; coller dans votre client mail</div>
  <div class="hb"><textarea id="ho" readonly spellcheck="false"></textarea></div>
  <p class="hint">Gmail : Param&#232;tres &#8594; Signature &mdash; Outlook : Signatures &#8594; onglet HTML</p>
</main>
</div>

function g(id){return document.getElementById(id);}
function v(id){var e=g(id);return e?e.value.trim():'';}
function ck(id){var e=g(id);return e?e.checked:false;}
function sc(a,b){var e=g(b);if(e)e.value=g(a).value;R();}
function sh(a,b){var x=g(a).value;if(/^#[0-9A-Fa-f]{6}$/.test(x)){g(b).value=x;R();}}
function P(name){
  var p=PS[name];if(!p)return;curPreset=name;
  var ks=['cnm','cac','cdiv'];
  for(var i=0;i<ks.length;i++){
    var k=ks[i];if(g(k))g(k).value=p[k];
    var h=k.replace('c','h');if(g(h))g(h).value=p[k];
  }
  R();
}
function getIC(){return ICONS[curPreset]||ICONS.navy;}
function icImg(key){
  return '<img src="'+getIC()[key]+'" width="16" height="16" style="display:inline-block;vertical-align:middle;margin-right:12px;opacity:0.7;" alt="">';
}
function socLink(href,key,label){
  return '<a href="'+href+'" style="display:inline-block;text-decoration:none;margin-right:18px;vertical-align:middle;">'
    +'<img src="'+getIC()[key]+'" width="20" height="20" style="display:block;opacity:0.55;filter:grayscale(100%);" alt="'+label+'">'
    +'</a>';
}
function row(key,content){
  return '<tr><td style="padding:5px 0;vertical-align:middle;white-space:nowrap;">'+icImg(key)+'</td>'
    +'<td style="padding:5px 0;font-family:Georgia,serif;font-size:12px;color:#555;vertical-align:middle;letter-spacing:0.01em;">'+content+'</td></tr>';
}
function lk(href,txt,col){
  return '<a href="'+href+'" style="color:'+col+';text-decoration:none;font-family:Georgia,serif;font-size:12px;">'+txt+'</a>';
}

  var init=(fn.charAt(0)+ln.charAt(0)).toUpperCase();

  var rows=row('email',lk('mailto:'+em,em,ac));
  if(ck('sp')) rows+=row('phone', lk('tel:'+ph.split(' ').join(''),ph,'#555'));
  if(ck('sm')) rows+=row('mobile',lk('tel:'+mo.split(' ').join(''),mo,'#555'));
  if(ck('sa')) rows+=row('location','<span style="font-family:Georgia,serif;font-size:12px;color:#555;">'+ad+'</span>');
  if(ck('sw2'))rows+=row('globe',  lk('https://'+we,we,ac));

  // Photo portrait (rectangle, pas rond)
  var photoHtml='';
  if(ck('sph')){
    if(photo){
      photoHtml='<img src="'+photo+'" width="100" height="130" style="display:block;object-fit:cover;object-position:center top;" alt="'+fn+' '+ln+'">';
    } else {
      photoHtml='<div style="width:100px;height:130px;background:#ede9fe;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:300;color:'+ac+';font-family:Georgia,serif;letter-spacing:2px;">'+init+'</div>';
    }
  }

  // Réseaux — juste les icônes, sans fond
  var socHtml='';
  if(ck('ss')){
    socHtml='<tr><td colspan="2" style="padding-top:12px;">'
      +'<div style="display:flex;align-items:center;">'
      +socLink(fbv,'facebook','Facebook')
      +socLink(liv,'linkedin','LinkedIn')
      +socLink(igv,'instagram','Instagram')
      +'</div></td></tr>';
  }

  // Logo discret en bas
  var logoHtml='';
  if(ck('slg')){
    logoHtml='<div style="margin-top:18px;padding-top:12px;border-top:1px solid #f0eeff;">'
      +'<img src="'+LOGO+'" height="22" style="display:block;opacity:0.18;filter:brightness(0);" alt="Dinamicom">'
      +'</div>';
  }

  var roHTML=ro.split('\n').join('<br>');

  // Signature : photo portrait | fine ligne colorée | identité + contacts
  var photoCol = ck('sph')
    ? '<td style="padding:0 12px 0 0;vertical-align:top;width:100px;">'+photoHtml+'</td>'
      +'<td style="width:2px;background:'+div+';padding:0;margin:0 12px;"></td>'
    : '';

  return '<table cellpadding="0" cellspacing="0" style="border-collapse:collapse;max-width:580px;background:#ffffff;font-family:Georgia,serif;padding:8px;">'
    +'<tr>'
    +photoCol
    +'<td style="padding:0 0 0 '+(ck('sph')?'28':'0')+'px;vertical-align:top;">'

    // Prénom / Nom / Titre
    +'<div style="margin-bottom:12px;">'
    +'<span style="font-family:Georgia,serif;font-size:18px;font-weight:400;color:'+nm+';letter-spacing:0.03em;">'+fn+' </span>'
    +'<span style="font-family:Georgia,serif;font-size:18px;font-weight:700;color:'+nm+';letter-spacing:0.05em;text-transform:uppercase;">'+ln+'</span>'
    +'<div style="font-family:Georgia,serif;font-size:10.5px;color:'+ac+';letter-spacing:0.14em;text-transform:uppercase;margin-top:6px;font-style:normal;">'+roHTML+'</div>'
    +'</div>'

    // Ligne décorative fine
    +'<div style="width:40px;height:1px;background:'+ac+';margin-bottom:16px;opacity:0.5;"></div>'

    // Contacts
    +'<table cellpadding="0" cellspacing="0">'+rows+socHtml+'</table>'

    +logoHtml
    +'</td>'
    +'</tr></table>';
}
function R(){var h=buildSig();g('pv').innerHTML=h;g('ho').value=h;}
function toast(msg){g('tm').textContent=msg;var t=g('tst');t.classList.add('on');setTimeout(function(){t.classList.remove('on');},2200);}
function cpH(){
  var ta=g('ho');ta.select();document.execCommand('copy');toast('HTML copie !');
  var b=g('bc');b.classList.add('ok');b.textContent='OK !';
  setTimeout(function(){b.classList.remove('ok');b.textContent='Copier HTML';},2200);
}
function dlH(){
  var bl=new Blob([g('ho').value],{type:'text/html;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(bl);
  a.download='signature-'+v('fn').toLowerCase()+'-'+v('ln').toLowerCase()+'.html';
  a.click();toast('Telecharge !');
}
var FDS=['fn','ln','ro','em','ph','mo','ad','we','fb','li','ig','cnm','cac','cdiv','sp','sm','sa','sw2','ss','sph','slg'];
function getFD(){
  var d={};
  for(var i=0;i<FDS.length;i++){var id=FDS[i];var e=g(id);if(e)d[id]=e.type==='checkbox'?e.checked:e.value;}
  d.photo=photo;d.preset=curPreset;return d;
}
function setFD(d){
  for(var i=0;i<FDS.length;i++){
    var id=FDS[i];var e=g(id);if(!e)continue;
    if(e.type==='checkbox')e.checked=(d[id]!==false);else e.value=d[id]||'';
    if(id.charAt(0)==='c'){var h=id.replace('c','h');if(g(h))g(h).value=d[id]||'';}
  }
  photo=d.photo||'';
  if(photo){g('pi').src=photo;g('pi').style.display='block';g('pp').style.display='none';}
  else{g('pi').style.display='none';g('pp').style.display='';}
  curPreset=d.preset||'navy';
}
function sP(){
  var n=v('fn')+' '+v('ln');var k=n.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'')||'profil';
  profiles[k]={label:n,data:getFD()};active=k;
  try{localStorage.setItem('dp',JSON.stringify(profiles));}catch(e){}
  rP();toast(n+' enregistre !');
}
function lP(k){if(!profiles[k])return;active=k;setFD(profiles[k].data);rP();R();}
function dP(k){
  delete profiles[k];try{localStorage.setItem('dp',JSON.stringify(profiles));}catch(e){}
  if(active===k){var f=Object.keys(profiles)[0];if(f)lP(f);}rP();
}
function rP(){
  var bar=g('bar');bar.innerHTML='<span>Profils :</span>';
  var ks=Object.keys(profiles);
  for(var i=0;i<ks.length;i++){(function(k){
    var p=profiles[k];var c=document.createElement('span');c.className='chip'+(k===active?' on':'');
    c.textContent=p.label;c.onclick=function(){lP(k);};bar.appendChild(c);
    var d=document.createElement('span');d.className='chip del';d.textContent='x';d.title='Supprimer';
    d.onclick=function(e){e.stopPropagation();if(confirm('Supprimer "'+p.label+'" ?'))dP(k);};bar.appendChild(d);
  })(ks[i]);}
  var nb=document.createElement('span');nb.className='chip add';nb.textContent='+ Nouveau';
  nb.onclick=function(){
    var cl=['fn','ln','ro','em','ph','mo','ad','we'];
    for(var i=0;i<cl.length;i++){if(g(cl[i]))g(cl[i]).value='';}
    photo='';g('pi').style.display='none';g('pp').style.display='';P('navy');
  };
  bar.appendChild(nb);
}
g('fi').addEventListener('change',function(){
  var file=this.files[0];if(!file)return;
  var r=new FileReader();
  r.onload=function(e){photo=e.target.result;g('pi').src=photo;g('pi').style.display='block';g('pp').style.display='none';R();};
  r.readAsDataURL(file);
});
(function(){
  try{var s=localStorage.getItem('dp');if(s)profiles=JSON.parse(s);}catch(e){profiles={};}
  if(!Object.keys(profiles).length){
    profiles['chloe_jacqueline']={label:'Chloe Jacqueline',data:getFD()};active='chloe_jacqueline';
    try{localStorage.setItem('dp',JSON.stringify(profiles));}catch(e){}
  } else {active=Object.keys(profiles)[0];setFD(profiles[active].data);}
  rP();R();
})();</script>
